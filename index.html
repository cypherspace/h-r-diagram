<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive H-R Diagram</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link
      rel="stylesheet"
      href="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.css"
    />
    <script
      src="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.js"
      charset="utf-8"
    ></script>
  </head>
  <body>
    <div id="app">
      <header>
        <div>
          <h1>Interactive H-R Diagram</h1>
          <p class="subtitle">
            Pick stars from the night sky and watch the
            Hertzsprung&ndash;Russell diagram come together.
          </p>
        </div>
      </header>
      <nav id="action-bar" class="header-buttons" aria-label="Information">
        <button id="how-btn" type="button" title="A short walk-through of how the app works">
          How it works
        </button>
        <button id="how-we-know-btn" type="button" title="The physics behind each calculated value">
          How we know
        </button>
        <button id="diagram-guide-btn" type="button" disabled title="Plot 200 stars on your diagram to unlock this guide.">
          Diagram guide
        </button>
        <button id="tour-btn" type="button" title="Replay the on-screen tour">
          ? Tour
        </button>
      </nav>

      <main>
        <section id="sky-panel" aria-label="Night sky viewer">
          <div id="sky-controls">
            <div class="control-group">
              <span class="control-group-heading">Find</span>
              <input id="goto-input" type="text" placeholder="e.g. M45, Sirius" />
              <button id="goto-btn">Go</button>
            </div>
            <div class="control-group">
              <span class="control-group-heading">Sky picture</span>
              <select id="survey-select">
                <option value="P/DSS2/color">DSS2 (colour)</option>
                <option value="P/PanSTARRS/DR1/color-z-zg-g">PanSTARRS</option>
                <option value="P/SDSS9/color">SDSS</option>
                <option value="P/2MASS/color">2MASS (infrared)</option>
              </select>
            </div>
            <div class="control-group">
              <span class="control-group-heading">Search</span>
              <button id="search-btn" class="primary" title="Look up real stars in the visible part of the sky (doesn't add them yet)">
                Search
              </button>
              <span class="control-divider" aria-hidden="true"></span>
              <button id="add-all-btn" title="Add every search result to the chart">
                Add all
              </button>
              <button id="clear-candidates-btn" title="Clear search-result markers from the sky">
                Clear results
              </button>
              <label class="control-pair">
                <span>limit</span>
                <input id="region-limit" type="number" min="1" max="500" value="50" />
              </label>
            </div>
            <div class="control-group">
              <span class="control-group-heading">Map options</span>
              <label class="control-pair">
                <input type="checkbox" id="opt-show-constellations" />
                Constellations
              </label>
              <label class="control-pair">
                <input type="checkbox" id="opt-show-markers" checked />
                Named markers
              </label>
              <label class="control-pair">
                <input type="checkbox" id="opt-show-mapinfo" />
                Projection &amp; coords
              </label>
            </div>
            <span class="hint" id="sky-status">Loading sky&hellip;</span>
          </div>
          <div id="aladin-lite-div"></div>
        </section>

        <section id="diagram-panel" aria-label="H-R diagram">
          <div id="diagram"></div>
          <details id="graph-options" open>
            <summary>Graph options</summary>
            <div id="diagram-controls"></div>
          </details>
        </section>

        <aside id="info-panel" aria-label="Selected star">
          <h2>Selected star</h2>
          <div id="data-panel">
            <p class="hint">Click a star marker on the sky or a dot on the chart.</p>
          </div>
          <div id="star-sets"></div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
