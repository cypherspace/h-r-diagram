e right-hand pane.

Once you've added some star dots, click any dot to see that star's info again. You'll also recentre the sky view on it.

You can scroll around and zoom in to different areas of the graph. There are also some options to help you get it to look the way you're most familiar with.`},{target:"#info-panel",title:"Read the star's info",body:`Here, you can pick any star and you'll see its temperature, brightness, distance, diameter, and a small picture of where it sits in the sky.

ronomers have catalogued in that part of the sky. They appear as little blue crosses."],["3. Add stars to your chart.","Click a single blue cross to add just that star, or hit Add all to add the whole bunch. You can also pick from the named star sets in the side panel (Sun-like, red dwarfs, white dwarfs, …) to plot a whole group at once."],["4. Watch the patterns appear.","Each dot is drawn in the colour the star really looks. As you add more stars, you'll see them fall into clear groups: a diagonal main sequence, red giants in the upper right, and tiny white dwarfs in the lower left."],["5. Inspect any star.","Click a dot on the chart to see that star's information, or click any marker on the sky map. The chart will highlight the star and the sky map will recentre on it."]]},Wl={heading:"What you're seeing",paragraphs:['The "Sky picture" dropdown switches between four real surveys of the sky. They differ in how the photo was taken and in how much sky they cover.',["DSS2 (colour).","Digitized Sky Survey 2. These are images from photographic plates (like photographic film, but the picture taken directly onto glass) taken in the 1980s and 90s. These have been tinted blue and red to look natural. But you might see that the map looks bluer or redder in certain places, which probably depends on the way that the particular plate was processed. Using photos of the entire sky, a composite image is made that allows us to look at the entire sky as if it was all one image. But it's a lower resolution than modern, digital images. Most of the artefacts in the app come from DSS2 plates."],["PanSTARRS.","A modern wide-field digital survey covering all the sky above the northern hemisphere and everything up to about 30 degrees below the Equator. Cleaner, deeper, and sharper than DSS, but missing the southernmost sky."],["SDSS.","Sloan Digital Sky Survey. Very deep digital imaging — so deep that if you zoom in far enough, you will see very distant galaxies — but it only covers about a third of the sky (mostly the northern galactic cap). Outside its survey data, you'll just see grey."],["2MASS (infrared).","A survey using infrared detectors instead of visible light. Cool red stars look unusually bright and hot blue stars look faint — opposite to your eye. Useful for seeing dust-shrouded objects."]]},Gl={heading:"Why are there strange marks?",paragraphs:["Real telescope photos are not perfect. You'll often see:",["Diffraction spikes.","Four (or six) lines of light radiating out from very bright stars. They're caused by light bending around the support struts holding the telescope's secondary mirror."],["Saturation halos.",'Fuzzy bright patches around the brightest stars, where the detector is overwhelmed and "blooms".'],["Black scorch marks.","On photographic plates, the centre of an extremely bright star can saturate the emulsion so completely that it scans as black. The big black spot in the centre of a bright star is one of these."],["Coloured stripes or rectangles.","The surveys are stitched from many smaller images. Where two tiles meet, or where one filter is missing, you can see colour mismatches."],"If the picture looks strange around a bright star, try switching to a different survey to see what's really there."]},Yl={heading:"Words to know",paragraphs:[["Star.","A giant ball of mostly hydrogen gas, held together by its own gravity. Its core is so hot and dense that hydrogen fuses into helium, and the energy released is what makes it shine."],["Spectral class.","Letters that sort stars by surface temperature. From hottest to coolest: O, B, A, F, G, K, M. The Sun is a G-class star. Each letter is split further with a digit (the Sun is G2)."],["Apparent magnitude.","How bright a star looks from Earth. The scale runs backwards — a lower number means brighter. The brightest stars in the sky have negative magnitudes."],["Absolute magnitude.","How bright a star would look if every star in the universe were placed at the same standard distance (10 parsecs). This lets you compare two stars fairly, ignoring how far away they happen to be."],["Light-year.","The distance light travels in one year — about 9.5 trillion kilometres. The closest star besides the Sun is over 4 light-years away."],["Parsec.","Another distance unit astronomers use. 1 parsec ≈ 3.26 light-years."],["Luminosity.","The total energy a star gives off every second. We measure it as a multiple of the Sun's energy output. Some stars are millions of times brighter; others are thousands of times dimmer."],["Temperature (Teff).","How hot the surface of the star is, in kelvin. Cool red stars are around 3000 K (2700 °C); the Sun is about 5800 K (5500 °C); the hottest blue stars are over 30 000 K."],["Main sequence.","The big diagonal stripe on the H-R diagram, where most stars live for most of their lives. Hot, bright, blue stars are at the top-left; cool, faint, red stars are at the bottom-right."],["Red giant.","An old star that has run out of hydrogen in its core and swelled up to many times its original size. Cool but enormous, so still very bright."],["White dwarf.","What's left of a sun-like star after it dies — a hot, planet-sized leftover that gradually cools off over billions of years."]]},he=[Jl,zl,Wl,Gl,Yl];class Ql{overlay;modal;keyHandler=e=>{e.key==="Escape"&&this.close()};open(){if(this.overlay)return;this.overlay=document.createElement("div"),this.overlay.className="how-overlay",this.overlay.addEventListener("click",i=>{i.target===this.overlay&&this.close()}),this.modal=document.createElement("div"),this.modal.className="how-modal",this.modal.setAttribute("role","dialog"),this.modal.setAttribute("aria-modal","true"),this.modal.setAttribute("aria-labelledby","how-title");const e=document.createElement("button");e.type="button",e.className="how-close",e.setAttribute("aria-label","Close"),e.textContent="×",e.addEventListener("click",()=>this.close());const n=document.createElement("h2");n.id="how-title",n.textContent=he[0].heading,th       <p>Hold a finger up at arm's length and look at it with your left
      eye, then your right. The finger seems to jump against the
      background. The closer the finger, the bigger the jump.
      Astronomers do the same thing using the Earth's orbit as their two
      "eyes": they photograph a star in January and again in July (the
      Earth has moved 300 million km), and measure how far the star has
      shifted against more distant stars in the background.</p>
      <p>The half-angle of that shift is called the
      <strong>parallax angle</strong>, written <em>p</em>. The parallax
      angle is tiny — less than one arcsecond (1/3600 of a degree).</p>
      ${Zl()}
      <p>The distance to the star is then</p>
      <blockquote class="hwk-eq"><strong>d (parsecs) = 1 / p (arcseconds)</strong></blockquote>
      <p>A parsec ("<strong>par</strong>allax-arc<strong>sec</strong>ond")
      is defined this way: if an object has a parallax of 1 arcsecond,
      it is 1 parsec away (≈ 3.26 light-years). Halve the parallax →
      double the distance.</p>
      <p>Gaia measures parallaxes for nearly <em>two billion stars</em>
      to better than a milliarcsecond — accurate enough to map the
      structure of the Galaxy.</p>
    `},{title:"Apparent brightness — magnitudes",bodyHtml:`
      <p>"Apparent brightness" is just how bright the star looks from
      Earth. We measure it on the <strong>magnitude scale</strong>, a
      system Hipparchus invented over 2000 years ago. He categorised
      the brightest stars he could see as "of the first magnitude",
      meaning the biggest, and carried on up to the "sixth magnitude"
      for the dimmest stars. Although it was made mathematical in the
      19th century, that scale is still the basis for how we talk
      about the brightness of stars. A star with an apparent magnitude
      of 1 is one of the brightest in the night sky, and if it has an
      apparent magnitude of more than 6, it's not visible to the
      human eye without help.</p>
      <p>Two quirks worth knowing:</p>
      <ol>
        <li><strong>Lower numbers mean brighter stars.</strong> Sirius
        is magnitude −1.46; the faintest stars you can see from a dark
        site are around magnitude 6. The Sun is magnitude −26.7. Yes,
        negative.</li>
        <li><strong>It's logarithmic.</strong> A difference of 5
        magnitudes is exactly a factor of 100 in brightness. So 1
        magnitude is 100<sup>1/5</sup> ≈ 2.512 times.</li>
      </ol>
      <p>Mathematically:</p>
      <blockquote class="hwk-eq"><strong>m₁ − m₂ = −2.5 log₁₀(F₁ / F₂)</strong></blockquote>
      <p>where <em>F</em> is the flux (energy arriving at Earth per
      square metre per second).</p>
      <p>Gaia measures apparent brightness in three bands because stars
      give out lots of light that isn't visible — ultra-violet and
      infra-red, for example. We use <em>G</em> (a broad "white-light"
      measurement) and treat it as the visual magnitude
      <em>m<sub>V</sub></em>.</p>
    `},{title:"Absolute magnitude — distance modulus",bodyHtml:`
      <p>Apparent brightness is unfair: a faint dim star nearby looks
      the same as a luminous star far away. To compare stars properly
      we ask: <em>how bright would this star look if it were 10 parsecs
      away?</em> That's the <strong>absolute magnitude</strong>,
      <em>M</em>.</p>
      <p>Light obeys the <strong>inverse-square law</strong> — moving
      twice as far away makes a star four times fainter. Convert to
      magnitudes (factor of 4 → 1.505 mag) and you get the
      <strong>distance modulus</strong>:</p>
      <blockquote class="hwk-eq"><strong>M = m − 5 log₁₀(d / 10 pc)</strong></blockquote>
      <p>Once we know <em>m</em> (Gaia measures it) and <em>d</em>
      (from parallax), <em>M</em> can be calculated. The Sun's absolute
      magnitude is +4.83 — a fairly ordinary G-type star, no longer
      burningly bright, if we were 10 parsecs away.</p>
    `},{title:"Temperature — colour and Wien's law",bodyHtml:`
      <p>Hot objects glow blue, cool objects glow red. A blacksmith's
      iron goes from dull red (~700 °C) through orange and yellow to
      white-hot (~1300 °C). The same physics works for stars, and it's
      described by <strong>Wien's displacement law</strong>.</p>
      <p>Quantitatively, this law says the wavelength at which a hot
      body radiates most strongly, λ<sub>max</sub>, is inversely
      proportional to its temperature:</p>
      <blockquote class="hwk-eq"><strong>λ<sub>max</sub> = b / T</strong>, where b ≈ 2.898 × 10⁻³ m·K</blockquote>
      ${tc()}
      ${ec()}
      <p>We don't measure λ<sub>max</sub> directly. Instead Gaia
      measures brightness through two coloured filters,
      <strong>BP</strong> (blue-photometer, ~330–680 nm) and
      <strong>RP</strong> (red-photometer, ~640–1050 nm), and we use
      the difference:</p>
      <blockquote class="hwk-eq"><strong>BP − RP = m<sub>BP</sub> − m<sub>RP</sub></strong>     (the "colour index")</blockquote>
      <p>A hot star is bright in BP and faint in RP, so BP−RP is small
      (or negative). A cool star is the opposite. A formula calibrated
      against well-studied stars (Ballesteros 2012) converts colour to
      temperature.</p>
      <p>For most stars, Gaia has already done this calculation and
      published a Teff (effective temperature, T<sub>eff</sub>, the
      estimated temperature of the surface of the star) in its
      astrophysical-parameters table — when available, we use that
      directly.</p>
    `},{title:"Luminosity — Stefan-Boltzmann and bolometric correction",bodyHtml:`
      <p><strong>Luminosity</strong> is a star's total power output —
      energy radiated per second, in watts, summed over every
      wavelength. The Sun's luminosity is 3.83 × 10²⁶ watts. Because
      this is such a large value, and all stars have such large values
      of energy output, we usually express other stars as multiples of
      the Sun's value, L<sub>☉</sub>, instead. For example,
      0.5 L<sub>☉</sub> or 1,234 L<sub>☉</sub> means the star emits
      half as much energy as the Sun, or 1,234 times as much energy
      as the Sun. What we call "brightness", then, is really
      luminosity. Brighter stars are brighter because they emit more
      energy.</p>
      <p>We can find the luminosity in two ways.</p>
      <p><strong>First, we can use the Stefan-Boltzmann law, which
      describes how much energy a hot object radiates.</strong> A
      blackbody of radius <em>R</em> and temperature <em>T</em>
      radiates</p>
      <blockquote class="hwk-eq"><strong>L = 4π R² σ T⁴</strong>, where σ = 5.67 × 10⁻⁸ W·m⁻²·K⁻⁴</blockquote>
      <p>So a star twice as big as the Sun at the same temperature is
      4× more luminous; a star at twice the temperature is 16× more
      luminous. This is why blue supergiants are millions of times
      brighter than the Sun: they are both many times bigger AND much
      hotter.</p>
      <p>However, we can't measure this. We can only measure how much
      power gets to Earth.</p>
      <p><strong>Second, from magnitudes.</strong> Absolute magnitude
      <em>M</em> tells us how much light we'd see <em>in a particular
      filter</em> (V, the visual band). For very cool stars most of
      the energy goes off in the infrared, so it doesn't get included
      in V, and for very hot stars it spills into ultraviolet. We add
      a small correction called the
      <strong>bolometric correction</strong> <em>BC(T)</em>, which has
      been determined from real star spectra previously:</p>
      <blockquote class="hwk-eq"><strong>M<sub>bol</sub> = M<sub>V</sub> + BC(T)</strong></blockquote>
      <p>Then we just compare the magnitude to the Sun.</p>
      <blockquote class="hwk-eq"><strong>L / L<sub>☉</sub> = 10<sup>(M<sub>bol,☉</sub> − M<sub>bol</sub>) / 2.5</sup></strong>, where M<sub>bol,☉</sub> = 4.74</blockquote>
      <p>The Gaia survey has already calculated the luminosity of many
      stars using this calculation — we use this when it's there.</p>
    `},{title:"Spectral class — OBAFGKM",bodyHtml:`
      <p>Long before anyone knew stars were balls of hydrogen plasma,
      astronomers split a star's light into its rainbow spectrum and
      noticed dark <strong>absorption lines</strong> at characteristic
      wavelengths. Different stars showed different patterns. They
      sorted them into letters; the letters were alphabetical,
      originally, and were based on what we could see in a star's
      composition (what it's made of) — but then scientists realised
      you could order all stars by temperature instead, and you didn't
      need all the letters to be able to categorise all stars. So we
      were left with this scale:</p>
      <table class="hwk-table">
        <thead>
          <tr><th>Class</th><th>Temperature</th><th>Colour</th><th>Example</th></tr>
        </thead>
        <tbody>
          <tr><td><strong>O</strong></td><td>≥ 30 000 K</td><td>blue</td><td>Mintaka</td></tr>
          <tr><td><strong>B</strong></td><td>10 000–30 000 K</td><td>blue-white</td><td>Rigel</td></tr>
          <tr><td><strong>A</strong></td><td>7 500–10 000 K</td><td>white</td><td>Sirius</td></tr>
          <tr><td><strong>F</strong></td><td>6 000–7 500 K</td><td>yellow-white</td><td>Procyon</td></tr>
          <tr><td><strong>G</strong></td><td>5 200–6 000 K</td><td>yellow</td><td>Sun</td></tr>
          <tr><td><strong>K</strong></td><td>3 700–5 200 K</td><td>orange</td><td>Aldebaran</td></tr>
          <tr><td><strong>M</strong></td><td>2 400–3 700 K</td><td>red</td><td>Betelgeuse, Proxima</td></tr>
        </tbody>
      </table>
      <p>Each letter has a digit 0–9 (hottest to coolest within the
      class), and a Roman numeral for <strong>luminosity class</strong>.
      Some examples are I = supergiant, III = giant, V = main sequence,
      "D" = white dwarf (although astronomers use slightly different
      terminology). The Sun is <strong>G2V</strong> — a main-sequence
      star slightly hotter than mid-G.</p>
      <p>This app looks at over 2 billion stars. Most of these stars
      haven't been formally classified yet. So if you do look at an
      unknown star (and you probably will!), we have to estimate the
      classification.</p>
    `}];class jl{overlay;modal;keyHandler=e=>{e.key==="Escape"&&this.close()};open(){if(this.overlay)return;this.overlay=document.createElement("div"),this.overlay.className="how-overlay",this.overlay.addEventListener("click",s=>{s.target===this.overlay&&this.close()}),this.modal=document.createElement("div"),this.modal.className="how-modal",this.modal.setAttribute("role","dialog"),this.modal.setAttribute("aria-modal","true"),this.modal.setAttribute("aria-labelledby","hwk-title");const e=document.createElement("button");e.type="button",e.className="how-close",e.setAttribute("aria-label","Close"),e.textContent="×",e.addEventListener("click",()=>this.close());const n=document.createElement("h2");n.id="hwk-title",n.textContent="How we know";const i=document.createElement("p");i.append("Each piece of data shown for a star — its distance, brightness, temperature, luminosity, classification — is calculated from raw measurements of the light it gives out. The measurements we use were made by a European Space Agency spacecraft called Gaia. You can ");const r=document.createElement("a");r.href="https://www.esa.int/Science_Exploration/Space_Science/Gaia/Gaia_overview",r.target="_blank",r.rel="noopener noreferrer",r.textContent="click here",i.appendChild(r),i.append(" to learn more about the spacecraft and the data; or click a topic to see how we use the data from Gaia."),this.modal.append(e,n,i);for(const s of Xl){const a=document.createElement("details");a.className="hwk-section";const o=document.createElement("summary");o.textContent=s.title,a.appendChild(o);const c=document.createElement("div");c.className="hwk-body",c.innerHTML=s.bodyHtml,a.appendChild(c),this.modal.appendChild(a)}this.overlay.appendChild(this.modal),document.body.appendChild(this.overlay),window.addEventListener("keydown",this.keyHandler),e.focus({preventScroll:!0})}close(){this.overlay?.remove(),this.overlay=void 0,this.modal=void 0,window.removeEventListener("keydown",this.keyHandler)}}function Zl(){re   <body>
    <div id="app">
      <header>
        <div>
          <h1>Interactive H-R Diagram</h1>
          <p class="subtitle">
            Pick stars from the night sky and watch the
            Hertzsprung&ndash;Russell diagram come together.
          </p>
        </div>
      </header>
      <nav id="action-bar" class="header-buttons" aria-label="Information">
        <button id="how-btn" type="button" title="A short walk-through of how the app works">
          How it works
        </button>
        <button id="how-we-know-btn" type="button" title="The physics behind each calculated value">
          How we know
        </button>
        <button id="diagram-guide-btn" type="button" disabled title="Plot 200 stars on your diagram to unlock this guide.">
          Diagram guide
        </button>
        <button id="tour-btn" type="button" title="Replay the on-screen tour">
          ? Tour
        </button>
      </nav>

      <main>
        <section id="sky-panel" aria-label="Night sky viewer">
          <div id="sky-controls">
            <div class="control-group">
              <span class="control-group-heading">Find</span>
              <input id="goto-input" type="text" placeholder="e.g. M45, Sirius" />
              <button id="goto-btn">Go</button>
            </div>
            <div class="control-group">
              <span class="control-group-heading">Sky picture</span>
              <select id="survey-select">
                <option value="P/DSS2/color">DSS2 (colour)</option>
                <option value="P/PanSTARRS/DR1/color-z-zg-g">PanSTARRS</option>
                <option value="P/SDSS9/color">SDSS</option>
                <option value="P/2MASS/color">2MASS (infrared)</option>
              </select>
            </div>
            <div class="control-group">
              <span class="control-group-heading">Search</span>
              <button id="search-btn" class="primary" title="Look up real stars in the visible part of the sky (doesn't add them yet)">
                Search
              </button>
              <span class="control-divider" aria-hidden="true"></span>
              <button id="add-all-btn" title="Add every search result to the chart">
                Add all
              </button>
              <button id="clear-candidates-btn" title="Clear search-result markers from the sky">
                Clear results
              </button>
              <label class="control-pair">
                <span>limit</span>
                <input id="region-limit" type="number" min="1" max="500" value="20" />
              </label>
            </div>
            <div class="control-group">
              <span class="control-group-heading">Map options</span>
              <label class="control-pair">
                <input type="checkbox" id="opt-show-constellations" />
                Constellations
              </label>
              <label class="control-pair">
                <input type="checkbox" id="opt-show-markers" checked />
                Named markers
              </label>
              <label class="control-pair">
                <input type="checkbox" id="opt-show-mapinfo" />
                Projection &amp; coords
              </label>
            </div>
            <span class="hint" id="sky-status">Loading sky&hellip;</span>
          </div>
          <div id="aladin-lite-div"></div>
        </section>

        <section id="diagram-panel" aria-label="H-R diagram">
          <div id="diagram"></div>
          <details id="graph-options" open>
            <summary>Graph options</summary>
            <div id="diagram-controls"></div>
          </details>
        </section>

        <aside id="info-panel" aria-label="Selected star">
          <h2>Selected star</h2>
          <div id="data-panel">
            <p class="hint">Click a star marker on the sky or a dot on the chart.</p>
          </div>
          <div id="star-sets"></div>
        </aside>
      </main>
    </div>
  </body>
</html>
