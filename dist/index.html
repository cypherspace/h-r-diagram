  </head>
  <body>
    <div id="app">
      <header>
        <h1>Interactive H-R Diagram</h1>
        <p class="subtitle">
          Click stars on the sky, watch them appear on the
          Hertzsprung&ndash;Russell diagram.
        </p>
      </header>

      <main>
        <section id="sky-panel" aria-label="Night sky viewer">
          <div id="sky-controls">
            <label>
              Goto
              <input id="goto-input" type="text" placeholder="e.g. M45, Sirius" />
            </label>
            <button id="goto-btn">Go</button>
            <label>
              Survey
              <select id="survey-select">
                <option value="P/DSS2/color">DSS2 color</option>
                <option value="P/PanSTARRS/DR1/color-z-zg-g">PanSTARRS DR1</option>
                <option value="P/SDSS9/color">SDSS9 color</option>
                <option value="P/2MASS/color">2MASS</option>
              </select>
            </label>
            <span class="hint" id="sky-status">Loading sky&hellip;</span>
          </div>
          <div id="aladin-lite-div"></div>
        </section>

        <section id="diagram-panel" aria-label="H-R diagram">
          <div id="diagram-controls"></div>
          <div id="diagram"></div>
        </section>

        <aside id="info-panel" aria-label="Selected star">
          <h2>Selected</h2>
          <div id="data-panel">
            <p class="hint">Click a sample star or a plotted point.</p>
          </div>
          <details id="catalog-details">
            <summary>Sample stars (quick add)</summary>
            <ul id="catalog-list"></ul>
          </details>
        </aside>
      </main>
    </div>
  </body>
</html>
