  <body>
    <div id="app">
      <header>
        <div>
          <h1>Interactive H-R Diagram</h1>
          <p class="subtitle">
            Pick stars from the night sky and watch the
            Hertzsprung&ndash;Russell diagram come together.
          </p>
        </div>
        <button id="tour-btn" type="button" title="Replay the tour">
          ? Tour
        </button>
      </header>

      <main>
        <section id="sky-panel" aria-label="Night sky viewer">
          <div id="sky-controls">
            <label>
              Find
              <input id="goto-input" type="text" placeholder="e.g. M45, Sirius" />
            </label>
            <button id="goto-btn">Go</button>
            <label>
              Sky picture
              <select id="survey-select">
                <option value="P/DSS2/color">DSS2 (colour)</option>
                <option value="P/PanSTARRS/DR1/color-z-zg-g">PanSTARRS</option>
                <option value="P/SDSS9/color">SDSS</option>
                <option value="P/2MASS/color">2MASS (infrared)</option>
              </select>
            </label>
            <button id="search-btn" title="Look up real stars in the visible part of the sky (doesn't add them yet)">
              Search
            </button>
            <button id="add-all-btn" title="Add every search result to the chart">
              Add all
            </button>
            <button id="clear-candidates-btn" title="Clear search-result markers from the sky">
              Clear results
            </button>
            <label>
              Limit
              <input id="region-limit" type="number" min="1" max="500" value="50" />
            </label>
            <details id="map-options-details">
              <summary>Star map options</summary>
              <div class="map-options-body">
                <label class="map-option">
                  <input type="checkbox" id="opt-show-constellations" />
                  Show constellations
                </label>
                <label class="map-option">
                  <input type="checkbox" id="opt-show-markers" checked />
                  Show named-star markers
                </label>
                <label class="map-option">
                  <input type="checkbox" id="opt-show-mapinfo" />
                  Show projection &amp; coordinates
                </label>
              </div>
            </details>
            <span class="hint" id="sky-status">Loading sky&hellip;</span>
          </div>
          <div id="aladin-lite-div"></div>
        </section>

        <section id="diagram-panel" aria-label="H-R diagram">
          <div id="diagram"></div>
          <details id="graph-options" open>
            <summary>Graph options</summary>
            <div id="diagram-controls"></div>
          </details>
        </section>

        <aside id="info-panel" aria-label="Selected star">
          <h2>Selected star</h2>
          <div id="data-panel">
            <p class="hint">Click a star marker on the sky or a dot on the chart.</p>
          </div>
          <div id="star-sets"></div>
        </aside>
      </main>
    </div>
  </body>
</html>
